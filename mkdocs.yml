site_name: HyperAI IDE Tutorial
site_description: Tutorial for the HyperAI IDE component
site_url: https://ide-tutorial.hyperai.di.uoa.gr/
copyright: Part of the <a href="https://hyper-ai-project.eu/">HyperAI project</a> &mdash; funded by the European Union
theme:
  name: material
  logo: assets/hyperai.svg
  favicon: assets/hyperai.svg
  font:
    text: Space Grotesk
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - content.code.copy
    - search.suggest
    - search.highlight
    - toc.follow
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode

extra_css:
  - stylesheets/extra.css

extra:
  generator: false
  homepage: https://hyper-ai-project.eu/
  social:
    - icon: material/laptop
      link: https://ide.hyperai.di.uoa.gr/
      name: Open the HyperAI IDE
    - icon: material/web
      link: https://hyper-ai-project.eu/
      name: HyperAI project website

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Introduction: index.md
  - Quick Start Demo: quick-start-demo.md
  - IDE Guide: ide-guide.md
  - DSL Specification:
      - Native Apps: dsl/native-apps.md
      - Device Apps: dsl/devices.md
  - Cookbook & Examples: cookbook.md
